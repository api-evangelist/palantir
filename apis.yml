apis:
  - aid: palantir:palantir-foundry-api
    name: Palantir Foundry API
    description: >-
      Palantir Foundry API provides programmatic access to data integration,
      transformation, and analysis workflows within the Palantir Foundry
      platform. The v2 API uses OAuth 2.0 and JSON, with endpoints organized
      across Admin, AIP Agents, Datasets, Ontologies, Orchestration,
      Connectivity, Media Sets, and Streams.
