aid: palantir
name: Palantir
description: >-
  Palantir is a data analytics company providing software platforms for
  organizations to integrate, analyze, and visualize data. Palantir Foundry
  and AIP provide REST APIs for data workflows, AI operations, ontology
  management, orchestration, and decision-making across enterprise and
  government use cases.
